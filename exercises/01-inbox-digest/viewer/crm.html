<!doctype html><html><head><meta charset="utf-8">
<title>Simulated CRM</title><style>
:root{--ink:#1F2041;--coral:#F35B67;--teal:#72D9D3;--gold:#E8AD5A;--line:#E3E5EE;--muted:#6E7191}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#F7F8FB}
header{background:var(--ink);color:#fff;padding:18px 28px;display:flex;align-items:center;gap:14px}
header .dot{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,var(--teal),var(--coral))}
header h1{font-size:18px;margin:0;font-weight:700}
header .sub{color:#A0A3BD;font-size:13px;margin-left:6px}
nav{padding:10px 28px;background:#fff;border-bottom:1px solid var(--line);font-size:14px}
nav a{color:var(--ink);text-decoration:none;margin-right:18px;font-weight:600}
nav a.active{color:var(--coral)}
.wrap{max-width:1000px;margin:0 auto;padding:24px 28px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;gap:12px;align-items:baseline}
.from{font-weight:700}
.subject{margin:4px 0 2px}
.snippet{color:var(--muted);font-size:14px}
.date{color:var(--muted);font-size:12px;white-space:nowrap}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;vertical-align:middle}
.unread{background:#FDE7E9;color:var(--coral)}
.tag{background:#E9F8F6;color:#1f8e85}
.body{margin-top:8px;font-size:14px;color:#3a3d57;display:none;border-top:1px dashed var(--line);padding-top:8px}
.card.open .body{display:block}
.card.is-unread{border-left:4px solid var(--coral)}
.meta{color:var(--muted);font-size:13px;margin:2px 0}
.note{background:#FAFAFE;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:14px;margin-top:8px;color:#3a3d57}
.open-item{color:var(--coral);font-weight:600;font-size:14px}
h2.section{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 8px}
.count{font-size:13px;color:var(--muted);margin-bottom:6px}
</style></head><body>
<header><div class="dot"></div><h1>Simulated CRM</h1><span class="sub">Exercise 1 · your notes on each contact · simulated data</span></header>
<nav><a href="inbox.html" class="">Inbox</a>
<a href="crm.html" class="active">CRM</a></nav>
<div class="wrap"><div class="count" id="count"></div><div id="list"></div></div>
<script>const DATA = {"generated_for": "Haffner Tech AI Workflow Training \u2014 Exercise 1 (simulated CRM)", "contacts": [{"id": "c-maria", "name": "Maria Alvarez", "email": "maria@brightpathco.com", "company": "BrightPath Co", "role": "Marketing Lead", "relationship": "Active client", "status": "In delivery", "last_contact": "2026-06-18", "open_item": "Send updated homepage (draft 3) by Friday", "notes": "Website redesign, phase 2. We sent draft 2 on Jun 15; Maria is reviewing with her team. She tends to give crisp, batched feedback. Decision-maker on copy; defers visual calls to us. Friendly, fast email replies."}, {"id": "c-tom", "name": "Tom Becker", "email": "tom.becker@nardelli.com", "company": "Nardelli & Sons", "role": "Owner", "relationship": "Prospect (warm)", "status": "Proposal stage", "last_contact": "2026-06-18", "open_item": "Send proposal: 2 landing pages + email sequence", "notes": "Discovery call on Jun 16 went well. Scope discussed: two landing pages and a 4-email welcome sequence. He brings decisions to a team meeting next week, so a clear one-page proposal works best. Price-sensitive but values speed."}, {"id": "c-priya", "name": "Priya Nair", "email": "priya@lumenanalytics.com", "company": "Lumen Analytics", "role": "Account Manager", "relationship": "Vendor", "status": "Renewal due", "last_contact": "2026-06-16", "open_item": "Decide on renewal (5 seats) before Jun 30", "notes": "Provides our analytics tooling. Renewal quote arrived Jun 16; current rate holds until Jun 30. We currently pay for 5 seats but likely only use 3 actively \u2014 worth reviewing before renewing."}, {"id": "c-greg", "name": "Greg Olsen", "email": "greg.olsen@meadowbrook.org", "company": "Meadowbrook Foundation", "role": "Operations Manager", "relationship": "Active client (support)", "status": "Open issue", "last_contact": "2026-06-19", "open_item": "Reply re: CSV export timeout on large reports", "notes": "Long-standing client on a support retainer. Reported a CSV export timeout on large reports; small exports work. Engineering is aware. Greg is patient and appreciates honest status updates over silence."}, {"id": "c-sandra", "name": "Sandra Kim", "email": "sandra@kimcreative.co", "company": "Kim Creative", "role": "Founder", "relationship": "Referral partner", "status": "Exploring collaboration", "last_contact": "2026-06-17", "open_item": "Schedule 20-min call (Wed/Thu) about a Q3 joint webinar", "notes": "Sends us referrals a few times a year; we reciprocate. Proposing a co-marketing webinar in Q3. Audiences overlap. Worth 20 minutes \u2014 these have led to good leads before."}, {"id": "c-dave", "name": "Dave Russo", "email": "dave.russo@embarkfin.com", "company": "Embark (internal)", "role": "Colleague \u2014 Finance", "relationship": "Internal", "status": "Awaiting info from you", "last_contact": "2026-06-19", "open_item": "Send Q3 marketing spend topline by channel before Friday", "notes": "Internal teammate prepping Friday's review. Just needs the Q3 marketing spend topline by channel \u2014 quick turnaround, low effort, high goodwill."}]};</script>
<script>
const crm = DATA;
const ul = document.getElementById('list');
document.getElementById('count').textContent = crm.contacts.length + ' contacts';
crm.contacts.forEach(p=>{
  const c = document.createElement('div');
  c.className='card';
  c.innerHTML =
    '<div class="row"><div class="from">'+p.name+' <span class="pill tag">'+p.relationship+'</span></div>'+
      '<div class="date">last contact '+p.last_contact+'</div></div>'+
    '<div class="meta">'+p.role+' · '+p.company+' · '+p.email+'</div>'+
    '<div class="meta">Status: <b>'+p.status+'</b></div>'+
    '<div class="open-item">Open item: '+p.open_item+'</div>'+
    '<div class="note">'+p.notes+'</div>';
  ul.appendChild(c);
});
</script>
</body></html>
